name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Compute release tarball SHA256
        id: sha
        run: |
          TAG=${GITHUB_REF_NAME}
          REPO=${{ github.repository }}
          URL="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          TAG: ${{ steps.sha.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          # Clone the tap repo  (needs TAP_TOKEN secret with repo write access)
          OWNER=$(echo "$REPO" | cut -d/ -f1)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${OWNER}/homebrew-musicli.git" tap

          VERSION=${TAG#v}
          sed -i "s|/archive/refs/tags/.*\.tar\.gz\"|/archive/refs/tags/${TAG}.tar.gz\"|" tap/Formula/musicli.rb
          sed -i "s|sha256 \"FILL_IN.*\"|sha256 \"${SHA256}\"|"                           tap/Formula/musicli.rb

          cd tap
          # Explicitly set remote with token so push doesn't fall back to GITHUB_TOKEN
          git remote set-url origin "https://x-access-token:${TAP_TOKEN}@github.com/${OWNER}/homebrew-musicli.git"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/musicli.rb
          git diff --cached --quiet || git commit -m "musicli ${TAG}" && git push
